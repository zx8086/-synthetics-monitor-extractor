name: "Setup Environment"
description: "Setup Bun, Snyk, and environment for synthetics-monitor-extractor"
inputs:
  snyk_token:
    description: "Snyk API token for authentication"
    required: false
runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Verify Bun installation
      shell: bash
      run: |
        bun --version
        echo "Bun installed successfully"

    - name: Install dependencies
      shell: bash
      run: |
        bun install --frozen-lockfile

    - name: Install and setup Snyk
      shell: bash
      run: |
        echo "Installing Snyk CLI via Bun..."
        # Install Snyk globally using Bun
        bun install -g snyk

        # Verify installation
        if snyk --version; then
          echo "Snyk CLI installed successfully"
        else
          echo "Failed to install Snyk CLI via Bun"
        fi
      continue-on-error: true

    - name: Authenticate with Snyk
      shell: bash
      run: |
        if [ -n "${{ inputs.snyk_token }}" ]; then
          echo "Authenticating with Snyk..."
          snyk auth ${{ inputs.snyk_token }}
          echo "Authentication completed"
        else
          echo "SNYK_TOKEN not provided. Skipping Snyk authentication."
        fi
      continue-on-error: true

    - name: Setup environment variables
      shell: bash
      run: |
        echo "NODE_ENV=production" >> $GITHUB_ENV
        echo "OPEN_TELEMETRY_ENABLED=true" >> $GITHUB_ENV
        echo "OPEN_TELEMETRY_SERVICE_NAME=synthetics-monitor-extractor" >> $GITHUB_ENV
        echo "OPEN_TELEMETRY_SERVICE_VERSION=1.0.0" >> $GITHUB_ENV
        echo "OPEN_TELEMETRY_DEPLOYMENT_ENVIRONMENT=production" >> $GITHUB_ENV
