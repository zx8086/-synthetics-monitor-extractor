# .github/workflows/docker-ci-cd.yml

name: Docker CI/CD with Bun and Snyk

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 0 * * 0"

env:
  BUILDKIT_STEP_LOG_MAX_SIZE: 10000000
  BUILDKIT_STEP_LOG_MAX_SPEED: 1000000
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  BUILDX_NO_DEFAULT_LOAD: true
  ACTIONS_CACHE_SIZE: 5GB
  ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ACTIONS_CACHE_DIR: /home/pi/.buildx-cache
  ACTIONS_RUNTIME_DIR: /home/pi/.buildx-runtime
  DOCKER_BUILDX_CACHE_DIR: /home/pi/.buildx-cache/docker
  GITHUB_WORKSPACE_CACHE: /home/pi/actions-runner/_work/_cache
  BUILDKIT_PROGRESS: plain
  BUILDX_RETRY_ATTEMPTS: 3
  BUILDX_RETRY_DELAY: 30s

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          snyk_token: ${{ secrets.SNYK_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:buildx-stable-1
          buildkitd-flags: |
            --allow-insecure-entitlement security.insecure
            --allow-insecure-entitlement network.host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.platform }}-
            ${{ runner.os }}-buildx-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Install and set up Snyk CLI as the primary method
      # Snyk is now installed and authenticated in the setup-environment action

      - name: Run Snyk to check for vulnerabilities
        run: |
          # Create directory for reports
          mkdir -p snyk-reports

          # Run vulnerability test
          echo "Running Snyk vulnerability scan..."
          snyk test --severity-threshold=high --json > snyk-reports/snyk-results.json || true
          snyk test --severity-threshold=high --sarif-file-output=snyk-reports/snyk-results.sarif || true

          # Run code scanning
          echo "Running Snyk code scan..."
          snyk code test --severity-threshold=high --json > snyk-reports/snyk-code-results.json || true
          snyk code test --severity-threshold=high --sarif-file-output=snyk-reports/snyk-code-results.sarif || true

          # List generated files
          echo "Generated report files:"
          ls -la snyk-reports/ || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # Check if the CLI approach failed to generate valid SARIF files
      - name: Check Snyk CLI results
        id: check-cli
        run: |
          if [ -s "snyk-reports/snyk-results.sarif" ] && [ -s "snyk-reports/snyk-code-results.sarif" ]; then
            echo "CLI approach succeeded"
            echo "cli_success=true" >> $GITHUB_OUTPUT
          else
            echo "CLI approach failed or produced empty results"
            echo "cli_success=false" >> $GITHUB_OUTPUT
          fi

      # Use GitHub Action as fallback if CLI approach failed
      - name: Snyk vulnerability scan (GitHub Action - Fallback)
        if: steps.check-cli.outputs.cli_success != 'true'
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-action-results.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk code scan (GitHub Action - Fallback)
        if: steps.check-cli.outputs.cli_success != 'true'
        uses: snyk/actions/node@master
        with:
          args: code test --severity-threshold=high --sarif-file-output=snyk-action-code-results.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk vulnerability results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name != 'pull_request'
        with:
          sarif_file: ${{ steps.check-cli.outputs.cli_success == 'true' && 'snyk-reports/snyk-results.sarif' || 'snyk-action-results.sarif' }}
          wait-for-processing: true
          category: snyk-vulnerability
        continue-on-error: true

      - name: Upload Snyk code results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name != 'pull_request'
        with:
          sarif_file: ${{ steps.check-cli.outputs.cli_success == 'true' && 'snyk-reports/snyk-code-results.sarif' || 'snyk-action-code-results.sarif' }}
          wait-for-processing: true
          category: snyk-code
        continue-on-error: true

      # Add summary of Snyk scanning status
      - name: Snyk scan summary
        run: |
          echo "## Snyk Security Scanning Summary" >> $GITHUB_STEP_SUMMARY

          echo "### Environment Information" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture: $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "- Snyk Version: $(snyk --version 2>/dev/null || echo 'Not available')" >> $GITHUB_STEP_SUMMARY
          echo "- Method used: ${{ steps.check-cli.outputs.cli_success == 'true' && 'CLI' || 'GitHub Action' }}" >> $GITHUB_STEP_SUMMARY

          echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "snyk-reports/snyk-results.sarif" ] || [ -f "snyk-action-results.sarif" ]; then
            echo "✅ Vulnerability scanning completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Vulnerability scanning failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "snyk-reports/snyk-code-results.sarif" ] || [ -f "snyk-action-code-results.sarif" ]; then
            echo "✅ Code scanning completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Code scanning failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "View results in the Security tab of this repository" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      # Removed fallback SARIF generation as the GitHub Action handles this reliably

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: zx8086/synthetics-monitor-extractor
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=synthetics-monitor-extractor
            org.opencontainers.image.description=Synthetics Monitor Extractor Service
            org.opencontainers.image.vendor=Siobytes
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            COMMIT_HASH=${{ github.sha }}
          sbom: true
          provenance: true

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        if: github.event_name != 'pull_request'
        with:
          image: zx8086/synthetics-monitor-extractor:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: sbom-${{ matrix.platform }}
          path: sbom.spdx.json
        continue-on-error: true

      # - name: Sign image with cosign
      #   uses: sigstore/cosign-installer@v3
      #   if: github.event_name != 'pull_request'

      # - name: Sign the published Docker image
      #   if: github.event_name != 'pull_request'
      #   env:
      #     COSIGN_EXPERIMENTAL: 1
      #   run: |
      #     echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign --yes {}@${{ steps.build.outputs.digest }}
      #   continue-on-error: true

      # - name: Run Trivy vulnerability scanner
      #   uses: aquasecurity/trivy-action@master
      #   if: github.event_name != 'pull_request'
      #   with:
      #     image-ref: zx8086/synthetics-monitor-extractor:${{ github.sha }}
      #     format: sarif
      #     output: trivy-results.sarif
      #   continue-on-error: true

      # - name: Upload Trivy scan results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: github.event_name != 'pull_request'
      #   with:
      #     sarif_file: trivy-results.sarif
      #   continue-on-error: true

  notify:
    needs: build-and-deploy
    runs-on: self-hosted
    if: always()
    steps:
      - name: Notify on success
        if: needs.build-and-deploy.result == 'success'
        run: |
          echo "✅ Docker build and deployment completed successfully"

      - name: Notify on failure
        if: needs.build-and-deploy.result == 'failure'
        run: |
          echo "❌ Docker build and deployment failed"
          exit 1
