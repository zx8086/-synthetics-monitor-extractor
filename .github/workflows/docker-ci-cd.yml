# .github/workflows/docker-ci-cd.yml

name: Docker CI/CD with Bun and Snyk

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 0 * * 0"

env:
  REGISTRY: docker.io
  IMAGE_NAME: zx8086/synthetics-monitor-extractor
  BUILDKIT_STEP_LOG_MAX_SIZE: 10000000
  BUILDKIT_STEP_LOG_MAX_SPEED: 1000000
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  BUILDKIT_PROGRESS: plain
  COSIGN_VERSION: "v2.5.2"
  SYFT_VERSION: "v1.28.0"
  COSIGN_YES: "true"
  COSIGN_EXPERIMENTAL: "true"

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          cosign_version: ${{ env.COSIGN_VERSION }}
          syft_version: ${{ env.SYFT_VERSION }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and use Docker Cloud Builder
        run: |
          # Check if cloud-builder already exists
          if docker buildx ls | grep -q "^cloud-builder "; then
            echo "Cloud builder already exists, using existing builder"
            docker buildx use cloud-builder
          else
            echo "Creating new cloud builder"
            docker buildx create --driver cloud zx8086/cldbuild --name cloud-builder --use
          fi
          docker buildx ls

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Security scanning moved to separate workflow for better performance
      # See .github/workflows/security-scan.yml

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=synthetics-monitor-extractor
            org.opencontainers.image.description=Synthetics Monitor Extractor Service
            org.opencontainers.image.vendor=Siobytes
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          builder: cloud-builder
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            COMMIT_HASH=${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max
          sbom: true
          provenance: true

      - name: Wait for image to be available
        if: github.event_name != 'pull_request'
        run: |
          echo "Waiting for image to be available in registry..."
          # Get the first tag from metadata (tags are newline-separated)
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1 | sed 's/.*://')
          echo "Using image tag: ${IMAGE_TAG}"
          # Wait for the image to be pushed and available
          for i in {1..30}; do
            if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} >/dev/null 2>&1; then
              echo "Image is available!"
              break
            fi
            echo "Waiting for image... (attempt $i/30)"
            sleep 5
          done
        continue-on-error: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.8
        if: github.event_name != 'pull_request'
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: anchore-sbom-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ github.run_id }}
          path: sbom.spdx.json
        continue-on-error: true

      - name: Test container health
        if: github.event_name != 'pull_request'
        run: |
          # Get the runner's architecture
          RUNNER_ARCH=$(uname -m)

          # Stop existing containers using port 9090
          docker ps -q --filter publish=9090 | xargs -r docker stop || true
          docker rm -f synthetics-monitor-test 2>/dev/null || true

          # Run container (will automatically use correct architecture)
          # Use the first tag from metadata output (tags are newline-separated)
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          echo "Using image: ${IMAGE_TAG}"
          docker run -d \
            --name synthetics-monitor-test \
            -p 9090:9090 \
            -e NODE_ENV=production \
            -e BUILD_VERSION=${{ github.ref_name || '0.0.1' }} \
            -e COMMIT_HASH=${{ github.sha }} \
            -e BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            -e LOG_LEVEL=info \
            "${IMAGE_TAG}"

          # Add delay and better error handling
          sleep 15
          if ! docker ps | grep -q synthetics-monitor-test; then
            echo "Container failed to start. Showing logs:"
            docker logs synthetics-monitor-test
            exit 1
          fi

          # Test health endpoint
          echo "Testing health endpoint..."
          curl -f http://localhost:9090/health || echo "Health endpoint test failed"

          # Test metrics endpoint
          echo "Testing metrics endpoint..."
          curl -f http://localhost:9090/metrics || echo "Metrics endpoint test failed"

          # Test API endpoints
          echo "Testing API endpoints..."
          curl -f http://localhost:9090/api/invalid-records || echo "API endpoint test failed"

          # Capture metrics
          CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' synthetics-monitor-test)
          echo "CONTAINER_STATUS=${CONTAINER_STATUS}" >> $GITHUB_ENV
          echo "CONTAINER_START_TIME=$(docker inspect --format='{{.State.StartedAt}}' synthetics-monitor-test)" >> $GITHUB_ENV

          # Show container logs for debugging
          echo "Container logs:"
          docker logs synthetics-monitor-test --tail 50
        continue-on-error: true

      - name: Run Snyk container scan
        if: github.event_name != 'pull_request'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "Running Snyk container scan..."
          # Get the first full tag from metadata (tags are newline-separated)
          FULL_IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          echo "Scanning image: ${FULL_IMAGE_TAG}"
          snyk container test "${FULL_IMAGE_TAG}" \
            --file=Dockerfile \
            --severity-threshold=high \
            --sarif-file-output=snyk-container.sarif \
            --json > snyk-container-report.json || echo "Container vulnerabilities found but continuing..."

          # Monitor on master branch
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            snyk container monitor "${FULL_IMAGE_TAG}" \
              --file=Dockerfile || echo "Container monitor command failed but continuing..."
          fi
        continue-on-error: true

      - name: Upload Snyk container scan results
        if: github.event_name != 'pull_request' && hashFiles('snyk-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container
          wait-for-processing: true
        continue-on-error: true

      - name: Generate comprehensive SBOM
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p sbom-output

          # Generate multiple SBOM formats
          echo "Generating SBOM files..."
          # Get the first tag from metadata (tags are newline-separated)
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          echo "Scanning image: ${IMAGE_TAG}"

          # Check if we just built this image locally
          if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "${IMAGE_TAG#*/}"; then
            echo "Using locally built image for SBOM generation..."
            "${GITHUB_WORKSPACE}/bin/syft" "${IMAGE_TAG}" \
              -o json=sbom-output/syft-sbom.json \
              -o spdx-json=sbom-output/spdx-sbom.json \
              -o cyclonedx-json=sbom-output/cyclonedx-sbom.json || echo "SBOM generation failed but continuing..."
          else
            # Try to pull the image if not available locally
            if docker pull "${IMAGE_TAG}"; then
              echo "Image pulled successfully, generating SBOM..."
              "${GITHUB_WORKSPACE}/bin/syft" "${IMAGE_TAG}" \
                -o json=sbom-output/syft-sbom.json \
                -o spdx-json=sbom-output/spdx-sbom.json \
                -o cyclonedx-json=sbom-output/cyclonedx-sbom.json || echo "SBOM generation failed but continuing..."
            else
              echo "Warning: Failed to pull image ${IMAGE_TAG}, SBOM generation skipped"
              echo "This is expected if the platform-specific image hasn't been pushed yet"
            fi
          fi

          # List generated files
          echo "Generated SBOM files:"
          ls -la sbom-output/ || true
        continue-on-error: true

      - name: Upload comprehensive SBOM files
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-sbom-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ github.run_id }}
          path: sbom-output/
          retention-days: 90
        continue-on-error: true

      - name: Verify image attestations
        if: github.event_name != 'pull_request'
        run: |
          # Set results directory name first
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RESULTS_DIR="attestation-results-${TIMESTAMP}"
          echo "ATTESTATION_RESULTS_DIR=${RESULTS_DIR}" >> $GITHUB_ENV

          mkdir -p "${RESULTS_DIR}"

          # Get image digest and reference
          echo "Getting image digest..."
          # Get the first tag from metadata (tags are newline-separated)
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          IMAGE_REF="${IMAGE_TAG}"

          # Try multiple methods to get the digest
          echo "Trying to get image digest for: ${IMAGE_REF}"

          # Method 1: Use build output digest if available
          if [ -n "${{ steps.build.outputs.digest }}" ]; then
            IMAGE_DIGEST="${{ steps.build.outputs.digest }}"
            echo "Using build output digest: ${IMAGE_DIGEST}"
          else
            # Method 2: Try docker buildx imagetools inspect
            echo "Trying docker buildx imagetools inspect..."
            IMAGE_DIGEST=$(docker buildx imagetools inspect "${IMAGE_REF}" --raw 2>/dev/null | jq -r '.manifests[]? | select(.platform.architecture == "${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}") | .digest' 2>/dev/null || echo "")

            if [ -z "$IMAGE_DIGEST" ]; then
              # Method 3: Try to get any manifest digest
              IMAGE_DIGEST=$(docker buildx imagetools inspect "${IMAGE_REF}" --raw 2>/dev/null | jq -r '.manifests[0].digest' 2>/dev/null || echo "")
            fi

            if [ -z "$IMAGE_DIGEST" ]; then
              # Method 4: Try docker manifest inspect as fallback
              IMAGE_DIGEST=$(docker manifest inspect "${IMAGE_REF}" 2>/dev/null | jq -r '.config.digest' 2>/dev/null || echo "")
            fi
          fi

          if [ -n "$IMAGE_DIGEST" ] && [ "$IMAGE_DIGEST" != "null" ] && [ "$IMAGE_DIGEST" != "" ]; then
            IMAGE_WITH_DIGEST="${IMAGE_REF}@${IMAGE_DIGEST}"
            echo "Image reference: ${IMAGE_REF}"
            echo "Image digest: ${IMAGE_DIGEST}"
            echo "Full reference: ${IMAGE_WITH_DIGEST}"

            # Download all attestations for analysis
            echo "Downloading attestations..."
            cosign download attestation "${IMAGE_WITH_DIGEST}" > "${RESULTS_DIR}/all-attestations.json" 2>/dev/null || echo "No attestations found for ${IMAGE_WITH_DIGEST}"

            # Extract from manifest and save all data
            echo "Extracting from manifest..."
            docker buildx imagetools inspect "${IMAGE_WITH_DIGEST}" --raw > "${RESULTS_DIR}/manifest.json" 2>/dev/null || true

            # Also save the raw manifest for the tag
            docker buildx imagetools inspect "${IMAGE_REF}" --raw > "${RESULTS_DIR}/manifest-tag.json" 2>/dev/null || true
          else
            echo "Could not get image digest, skipping attestation verification"
            echo "This may be expected for multi-platform builds or if the image hasn't been pushed yet"
          fi

          # Generate comprehensive report
          {
            echo "### 📝 Attestation Verification Report"
            echo "- Image: ${IMAGE_REF}"
            echo "- Digest: ${IMAGE_DIGEST}"
            echo "- Timestamp: $(date -u)"
            echo ""
            echo "#### Verification Results:"

            for file in "${RESULTS_DIR}"/*.json; do
              if [ -s "$file" ]; then
                basename=$(basename "$file")
                size=$(wc -c < "$file")
                echo "- File: ${basename}"
                echo "  - Size: ${size} bytes"
                if jq -e . >/dev/null 2>&1 < "$file"; then
                  echo "  - Status: ✅ Valid JSON"
                else
                  echo "  - Status: ⚠️ Invalid JSON"
                fi
              fi
            done
          } > "${RESULTS_DIR}/verification-report.md"
        continue-on-error: true

      - name: Upload attestation results
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: attestation-results-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: |
            ${{ env.ATTESTATION_RESULTS_DIR }}/*.json
            ${{ env.ATTESTATION_RESULTS_DIR }}/*.md
          retention-days: 90
        continue-on-error: true

      - name: Docker Build Summary
        if: always()
        run: |
          {
            echo "### 🐳 Docker Build Summary"
            echo ""
            echo "#### 📊 Build Overview"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| 🆔 Build ID | \`${GITHUB_SHA::7}\` |"
            echo "| 📦 Image | synthetics-monitor-extractor |"
            echo "| 🏗️ Platform | ${{ matrix.platform }} |"
            echo "| ⚡ Status | ${CONTAINER_STATUS:-N/A} |"

            # Container Status
            if [ "${CONTAINER_STATUS:-}" = "running" ]; then
              echo "| 🔄 Status | ✅ Running |"
              echo "| 🕒 Start Time | ${CONTAINER_START_TIME:-N/A} |"
            else
              echo "| 🔄 Status | ⚠️ Not Running |"
            fi

            echo ""
            echo "#### 🔒 Security Scanning"
            echo "| Scan Type | Status |"
            echo "|-----------|--------|"

            # Container scan status
            if [ -f "snyk-container.sarif" ]; then
              echo "| 📦 Container Scan | ✅ Completed |"
            else
              echo "| 📦 Container Scan | ⚠️ Failed |"
            fi

            echo ""
            echo "ℹ️ Additional security scans run in separate workflow"

            echo ""
            echo "#### 📋 Supply Chain Security"
            echo "| Component | Status |"
            echo "|-----------|--------|"

            if [ -d "sbom-output" ] && [ "$(ls -A sbom-output)" ]; then
              echo "| 📄 SBOM Generation | ✅ Completed |"
            else
              echo "| 📄 SBOM Generation | ⚠️ Failed |"
            fi

            if [ -d "${{ env.ATTESTATION_RESULTS_DIR }}" ] && [ "$(ls -A ${{ env.ATTESTATION_RESULTS_DIR }})" ]; then
              echo "| 🔐 Attestation Verification | ✅ Completed |"
            else
              echo "| 🔐 Attestation Verification | ⚠️ Failed |"
            fi

            echo ""
            echo "#### 🔗 Useful Links"
            echo "- [Security Tab](https://github.com/${{ github.repository }}/security)"
            echo "- [Actions Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- [Docker Hub](https://hub.docker.com/r/zx8086/synthetics-monitor-extractor)"

          } >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: |
          echo "Starting cleanup process..."

          # Remove test containers
          docker container rm -f synthetics-monitor-test 2>/dev/null || true

          # Clean up temporary files
          rm -rf sbom-output/ || true
          rm -rf "${{ env.ATTESTATION_RESULTS_DIR }}" || true
          rm -f snyk-container.sarif || true
          rm -f sbom.spdx.json || true

          # Docker cleanup
          docker image prune -f --filter "until=24h" || true
          docker volume prune -f || true
          docker builder prune -f --filter "until=24h" || true

          # Remove verification tools
          rm -rf "${GITHUB_WORKSPACE}/bin" || true
          rm -rf ~/.sigstore || true

          echo "Cleanup completed successfully"
        continue-on-error: true

  notify:
    needs: build-and-deploy
    runs-on: self-hosted
    if: always()
    steps:
      - name: Notify on success
        if: needs.build-and-deploy.result == 'success'
        run: |
          echo "✅ Docker build and deployment completed successfully"

      - name: Notify on failure
        if: needs.build-and-deploy.result == 'failure'
        run: |
          echo "❌ Docker build and deployment failed"
          exit 1
