# .github/workflows/docker-ci-cd.yml

name: Docker CI/CD with Bun and Snyk

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 0 * * 0"

env:
  REGISTRY: docker.io
  IMAGE_NAME: zx8086/synthetics-monitor-extractor
  BUILDKIT_STEP_LOG_MAX_SIZE: 10000000
  BUILDKIT_STEP_LOG_MAX_SPEED: 1000000
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  BUILDX_NO_DEFAULT_LOAD: true
  BUILDKIT_INLINE_CACHE: 1
  BUILDX_CACHE_TTL: "168h"
  ACTIONS_CACHE_SIZE: 5GB
  ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ACTIONS_CACHE_DIR: /home/pi/.buildx-cache
  ACTIONS_RUNTIME_DIR: /home/pi/.buildx-runtime
  DOCKER_BUILDX_CACHE_DIR: /home/pi/.buildx-cache/docker
  GITHUB_WORKSPACE_CACHE: /home/pi/actions-runner/_work/_cache
  BUILDKIT_PROGRESS: plain
  BUILDX_RETRY_ATTEMPTS: 3
  BUILDX_RETRY_DELAY: 30s
  COSIGN_VERSION: "v2.4.0"
  SYFT_VERSION: "v1.19.0"
  COSIGN_YES: "true"
  COSIGN_EXPERIMENTAL: "true"

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          snyk_token: ${{ secrets.SNYK_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:buildx-stable-1
          buildkitd-flags: |
            --allow-insecure-entitlement security.insecure
            --allow-insecure-entitlement network.host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.platform }}-
            ${{ runner.os }}-buildx-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Install and set up Snyk CLI as the primary method
      # Snyk is now installed and authenticated in the setup-environment action

      - name: Run Snyk to check for vulnerabilities
        run: |
          # Create directory for reports
          mkdir -p snyk-reports

          # Run vulnerability test
          echo "Running Snyk vulnerability scan..."
          snyk test --severity-threshold=high --json > snyk-reports/snyk-results.json || true
          snyk test --severity-threshold=high --sarif-file-output=snyk-reports/snyk-results.sarif || true

          # Run code scanning
          echo "Running Snyk code scan..."
          snyk code test --severity-threshold=high --json > snyk-reports/snyk-code-results.json || true
          snyk code test --severity-threshold=high --sarif-file-output=snyk-reports/snyk-code-results.sarif || true

          # List generated files
          echo "Generated report files:"
          ls -la snyk-reports/ || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # Check if the CLI approach failed to generate valid SARIF files
      - name: Check Snyk CLI results
        id: check-cli
        run: |
          if [ -s "snyk-reports/snyk-results.sarif" ] && [ -s "snyk-reports/snyk-code-results.sarif" ]; then
            echo "CLI approach succeeded"
            echo "cli_success=true" >> $GITHUB_OUTPUT
          else
            echo "CLI approach failed or produced empty results"
            echo "cli_success=false" >> $GITHUB_OUTPUT
          fi

      # Use GitHub Action as fallback if CLI approach failed
      - name: Snyk vulnerability scan (GitHub Action - Fallback)
        if: steps.check-cli.outputs.cli_success != 'true'
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-action-results.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk code scan (GitHub Action - Fallback)
        if: steps.check-cli.outputs.cli_success != 'true'
        uses: snyk/actions/node@master
        with:
          args: code test --severity-threshold=high --sarif-file-output=snyk-action-code-results.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk vulnerability results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name != 'pull_request'
        with:
          sarif_file: ${{ steps.check-cli.outputs.cli_success == 'true' && 'snyk-reports/snyk-results.sarif' || 'snyk-action-results.sarif' }}
          wait-for-processing: true
          category: snyk-vulnerability
        continue-on-error: true

      - name: Upload Snyk code results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name != 'pull_request'
        with:
          sarif_file: ${{ steps.check-cli.outputs.cli_success == 'true' && 'snyk-reports/snyk-code-results.sarif' || 'snyk-action-code-results.sarif' }}
          wait-for-processing: true
          category: snyk-code
        continue-on-error: true

      # Add summary of Snyk scanning status
      - name: Snyk scan summary
        run: |
          echo "## Snyk Security Scanning Summary" >> $GITHUB_STEP_SUMMARY

          echo "### Environment Information" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture: $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "- Snyk Version: $(snyk --version 2>/dev/null || echo 'Not available')" >> $GITHUB_STEP_SUMMARY
          echo "- Method used: ${{ steps.check-cli.outputs.cli_success == 'true' && 'CLI' || 'GitHub Action' }}" >> $GITHUB_STEP_SUMMARY

          echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "snyk-reports/snyk-results.sarif" ] || [ -f "snyk-action-results.sarif" ]; then
            echo "✅ Vulnerability scanning completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Vulnerability scanning failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "snyk-reports/snyk-code-results.sarif" ] || [ -f "snyk-action-code-results.sarif" ]; then
            echo "✅ Code scanning completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Code scanning failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "View results in the Security tab of this repository" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      # Removed fallback SARIF generation as the GitHub Action handles this reliably

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=synthetics-monitor-extractor
            org.opencontainers.image.description=Synthetics Monitor Extractor Service
            org.opencontainers.image.vendor=Siobytes
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            COMMIT_HASH=${{ github.sha }}
          sbom: true
          provenance: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Wait for image to be available
        if: github.event_name != 'pull_request'
        run: |
          echo "Waiting for image to be available in registry..."
          # Get the first tag from metadata
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | cut -d' ' -f1 | sed 's/.*://')
          echo "Using image tag: ${IMAGE_TAG}"
          # Wait for the image to be pushed and available
          for i in {1..30}; do
            if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} >/dev/null 2>&1; then
              echo "Image is available!"
              break
            fi
            echo "Waiting for image... (attempt $i/30)"
            sleep 5
          done
        continue-on-error: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.2
        if: github.event_name != 'pull_request'
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output-file: sbom.spdx.json
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: sbom-${{ strategy.job-index }}
          path: sbom.spdx.json
        continue-on-error: true

      - name: Install verification tools
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          # Create directories first
          mkdir -p "${GITHUB_WORKSPACE}/bin"
          mkdir -p "${GITHUB_WORKSPACE}/tmp"
          
          cd "${GITHUB_WORKSPACE}/tmp"

          # Detect architecture
          ARCH=$(uname -m)
          case $ARCH in
            x86_64)
              ARCH_SUFFIX="amd64"
              ;;
            aarch64|arm64)
              ARCH_SUFFIX="arm64"
              ;;
            *)
              echo "Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac

          # Install cosign
          curl -Lo cosign "https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-${ARCH_SUFFIX}"
          chmod +x cosign
          mv cosign "${GITHUB_WORKSPACE}/bin/"

          # Install syft
          SYFT_RELEASE=$(curl -s https://api.github.com/repos/anchore/syft/releases/latest | grep -o '"tag_name": ".*"' | cut -d'"' -f4)
          curl -Lo syft.tar.gz "https://github.com/anchore/syft/releases/download/${SYFT_RELEASE}/syft_${SYFT_RELEASE#v}_linux_${ARCH_SUFFIX}.tar.gz"
          tar xzf syft.tar.gz syft
          mv syft "${GITHUB_WORKSPACE}/bin/"

          # Add to PATH
          echo "${GITHUB_WORKSPACE}/bin" >> $GITHUB_PATH

          # Cleanup
          cd "${GITHUB_WORKSPACE}"
          rm -rf "${GITHUB_WORKSPACE}/tmp"

          # Verify installations
          "${GITHUB_WORKSPACE}/bin/cosign" version || true
          "${GITHUB_WORKSPACE}/bin/syft" --version || true
        continue-on-error: true

      - name: Test container health
        if: github.event_name != 'pull_request'
        run: |
          # Get the runner's architecture
          RUNNER_ARCH=$(uname -m)
          
          # Stop existing containers using port 3000
          docker ps -q --filter publish=3000 | xargs -r docker stop || true
          docker rm -f synthetics-monitor-test 2>/dev/null || true
          
          # Run container (will automatically use correct architecture)
          # Use the first tag from metadata output
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | cut -d' ' -f1 | sed 's/.*://')
          docker run -d \
            --name synthetics-monitor-test \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e BUILD_VERSION=${{ github.ref_name || '0.0.1' }} \
            -e COMMIT_HASH=${{ github.sha }} \
            -e BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            -e LOG_LEVEL=info \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          
          # Add delay and better error handling
          sleep 15
          if ! docker ps | grep -q synthetics-monitor-test; then
            echo "Container failed to start. Showing logs:"
            docker logs synthetics-monitor-test
            exit 1
          fi

          # Test health endpoint
          echo "Testing health endpoint..."
          curl -f http://localhost:3000/health || echo "Health endpoint test failed"
          
          # Test metrics endpoint
          echo "Testing metrics endpoint..."
          curl -f http://localhost:3000/metrics || echo "Metrics endpoint test failed"
          
          # Test API endpoints
          echo "Testing API endpoints..."
          curl -f http://localhost:3000/api/invalid-records || echo "API endpoint test failed"
          
          # Capture metrics
          CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' synthetics-monitor-test)
          echo "CONTAINER_STATUS=${CONTAINER_STATUS}" >> $GITHUB_ENV
          echo "CONTAINER_START_TIME=$(docker inspect --format='{{.State.StartedAt}}' synthetics-monitor-test)" >> $GITHUB_ENV
          
          # Show container logs for debugging
          echo "Container logs:"
          docker logs synthetics-monitor-test --tail 50
        continue-on-error: true

      - name: Run Snyk container scan
        if: github.event_name != 'pull_request'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "Running Snyk container scan..."
          # Get the first tag from metadata
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | cut -d' ' -f1)
          echo "Scanning image: ${IMAGE_TAG}"
          snyk container test ${IMAGE_TAG} \
            --file=Dockerfile \
            --severity-threshold=high \
            --sarif-file-output=snyk-container.sarif \
            --json > snyk-container-report.json || echo "Container vulnerabilities found but continuing..."
            
          # Monitor on master branch
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            snyk container monitor ${IMAGE_TAG} \
              --file=Dockerfile || echo "Container monitor command failed but continuing..."
          fi
        continue-on-error: true

      - name: Upload Snyk container scan results
        if: github.event_name != 'pull_request' && hashFiles('snyk-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container
          wait-for-processing: true
        continue-on-error: true

      - name: Generate comprehensive SBOM
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p sbom-output
          
          # Generate multiple SBOM formats
          echo "Generating SBOM files..."
          # Get the first tag from metadata
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | cut -d' ' -f1)
          echo "Scanning image: ${IMAGE_TAG}"
          "${GITHUB_WORKSPACE}/bin/syft" ${IMAGE_TAG} \
            -o json=sbom-output/syft-sbom.json \
            -o spdx-json=sbom-output/spdx-sbom.json \
            -o cyclonedx-json=sbom-output/cyclonedx-sbom.json || echo "SBOM generation failed but continuing..."
          
          # List generated files
          echo "Generated SBOM files:"
          ls -la sbom-output/ || true
        continue-on-error: true

      - name: Upload comprehensive SBOM files
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-sbom-${{ strategy.job-index }}
          path: sbom-output/
          retention-days: 90
        continue-on-error: true

      - name: Verify image attestations
        if: github.event_name != 'pull_request'
        run: |
          # Set results directory name first
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RESULTS_DIR="attestation-results-${TIMESTAMP}"
          echo "ATTESTATION_RESULTS_DIR=${RESULTS_DIR}" >> $GITHUB_ENV
          
          mkdir -p "${RESULTS_DIR}"
          
          # Get image digest and reference
          echo "Getting image digest..."
          # Get the first tag from metadata
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | cut -d' ' -f1)
          IMAGE_REF="${IMAGE_TAG}"
          IMAGE_DIGEST=$(docker buildx imagetools inspect "${IMAGE_REF}" --raw | jq -r '.manifests[0].digest' 2>/dev/null || echo "unknown")
          
          if [ "$IMAGE_DIGEST" != "unknown" ]; then
            IMAGE_WITH_DIGEST="${IMAGE_REF}@${IMAGE_DIGEST}"
            echo "Image reference: ${IMAGE_REF}"
            echo "Image digest: ${IMAGE_DIGEST}"

            # Download all attestations for analysis
            echo "Downloading attestations..."
            cosign download attestation "${IMAGE_WITH_DIGEST}" > "${RESULTS_DIR}/all-attestations.json" 2>/dev/null || echo "No attestations found"

            # Extract from manifest and save all data
            echo "Extracting from manifest..."
            docker buildx imagetools inspect "${IMAGE_WITH_DIGEST}" --raw > "${RESULTS_DIR}/manifest.json" 2>/dev/null || true
          else
            echo "Could not get image digest, skipping attestation verification"
          fi
          
          # Generate comprehensive report
          {
            echo "### 📝 Attestation Verification Report"
            echo "- Image: ${IMAGE_REF}"
            echo "- Digest: ${IMAGE_DIGEST}"
            echo "- Timestamp: $(date -u)"
            echo ""
            echo "#### Verification Results:"

            for file in "${RESULTS_DIR}"/*.json; do
              if [ -s "$file" ]; then
                basename=$(basename "$file")
                size=$(wc -c < "$file")
                echo "- File: ${basename}"
                echo "  - Size: ${size} bytes"
                if jq -e . >/dev/null 2>&1 < "$file"; then
                  echo "  - Status: ✅ Valid JSON"
                else
                  echo "  - Status: ⚠️ Invalid JSON"
                fi
              fi
            done
          } > "${RESULTS_DIR}/verification-report.md"
        continue-on-error: true

      - name: Upload attestation results
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: attestation-results-${{ strategy.job-index }}
          path: |
            ${{ env.ATTESTATION_RESULTS_DIR }}/*.json
            ${{ env.ATTESTATION_RESULTS_DIR }}/*.md
          retention-days: 90
        continue-on-error: true

      # - name: Sign image with cosign
      #   uses: sigstore/cosign-installer@v3
      #   if: github.event_name != 'pull_request'

      # - name: Sign the published Docker image
      #   if: github.event_name != 'pull_request'
      #   env:
      #     COSIGN_EXPERIMENTAL: 1
      #   run: |
      #     echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign --yes {}@${{ steps.build.outputs.digest }}
      #   continue-on-error: true

      # - name: Run Trivy vulnerability scanner
      #   uses: aquasecurity/trivy-action@master
      #   if: github.event_name != 'pull_request'
      #   with:
      #     image-ref: zx8086/synthetics-monitor-extractor:${{ github.sha }}
      #     format: sarif
      #     output: trivy-results.sarif
      #   continue-on-error: true

      # - name: Upload Trivy scan results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: github.event_name != 'pull_request'
      #   with:
      #     sarif_file: trivy-results.sarif
      #   continue-on-error: true

      - name: Docker Build Summary
        if: always()
        run: |
          {
            echo "### 🐳 Docker Build Summary"
            echo ""
            echo "#### 📊 Build Overview"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| 🆔 Build ID | \`${GITHUB_SHA::7}\` |"
            echo "| 📦 Image | synthetics-monitor-extractor |"
            echo "| 🏗️ Platform | ${{ matrix.platform }} |"
            echo "| ⚡ Status | ${CONTAINER_STATUS:-N/A} |"
            
            # Container Status
            if [ "${CONTAINER_STATUS:-}" = "running" ]; then
              echo "| 🔄 Status | ✅ Running |"
              echo "| 🕒 Start Time | ${CONTAINER_START_TIME:-N/A} |"
            else
              echo "| 🔄 Status | ⚠️ Not Running |"
            fi
            
            echo ""
            echo "#### 🔒 Security Scanning"
            echo "| Scan Type | Status |"
            echo "|-----------|--------|"
            
            # Check for SARIF files
            if [ -f "snyk-reports/snyk-results.sarif" ] || [ -f "snyk-action-results.sarif" ]; then
              echo "| 🔍 Vulnerability Scan | ✅ Completed |"
            else
              echo "| 🔍 Vulnerability Scan | ⚠️ Failed |"
            fi
            
            if [ -f "snyk-reports/snyk-code-results.sarif" ] || [ -f "snyk-action-code-results.sarif" ]; then
              echo "| 🔎 Code Scan | ✅ Completed |"
            else
              echo "| 🔎 Code Scan | ⚠️ Failed |"
            fi
            
            if [ -f "snyk-container.sarif" ]; then
              echo "| 📦 Container Scan | ✅ Completed |"
            else
              echo "| 📦 Container Scan | ⚠️ Failed |"
            fi
            
            echo ""
            echo "#### 📋 Supply Chain Security"
            echo "| Component | Status |"
            echo "|-----------|--------|"
            
            if [ -d "sbom-output" ] && [ "$(ls -A sbom-output)" ]; then
              echo "| 📄 SBOM Generation | ✅ Completed |"
            else
              echo "| 📄 SBOM Generation | ⚠️ Failed |"
            fi
            
            if [ -d "${{ env.ATTESTATION_RESULTS_DIR }}" ] && [ "$(ls -A ${{ env.ATTESTATION_RESULTS_DIR }})" ]; then
              echo "| 🔐 Attestation Verification | ✅ Completed |"
            else
              echo "| 🔐 Attestation Verification | ⚠️ Failed |"
            fi
            
            echo ""
            echo "#### 🔗 Useful Links"
            echo "- [Security Tab](https://github.com/${{ github.repository }}/security)"
            echo "- [Actions Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- [Docker Hub](https://hub.docker.com/r/zx8086/synthetics-monitor-extractor)"
            
          } >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: |
          echo "Starting cleanup process..."
          
          # Remove test containers
          docker container rm -f synthetics-monitor-test 2>/dev/null || true
          
          # Clean up temporary files
          rm -rf snyk-reports/ || true
          rm -rf sbom-output/ || true
          rm -rf "${{ env.ATTESTATION_RESULTS_DIR }}" || true
          rm -f snyk-*.sarif || true
          rm -f snyk-*.json || true
          rm -f sbom.spdx.json || true
          
          # Docker cleanup
          docker image prune -f --filter "until=24h" || true
          docker volume prune -f || true
          docker builder prune -f --filter "until=24h" || true
          
          # Remove verification tools
          rm -rf "${GITHUB_WORKSPACE}/bin" || true
          rm -rf ~/.sigstore || true
          
          echo "Cleanup completed successfully"
        continue-on-error: true

  notify:
    needs: build-and-deploy
    runs-on: self-hosted
    if: always()
    steps:
      - name: Notify on success
        if: needs.build-and-deploy.result == 'success'
        run: |
          echo "✅ Docker build and deployment completed successfully"

      - name: Notify on failure
        if: needs.build-and-deploy.result == 'failure'
        run: |
          echo "❌ Docker build and deployment failed"
          exit 1
